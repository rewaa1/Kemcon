name: CI

on:
  push:
    branches: [main, ui/ux-enhnacments]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Type-check, Lint & E2E
    runs-on: ubuntu-latest

    env:
      # Dummy values so Next.js build doesn't fail on missing env validation.
      # Real secrets are only needed for the deployed environment.
      SMTP_HOST: smtp.example.com
      SMTP_PORT: "587"
      SMTP_USER: ci@example.com
      SMTP_PASS: ci-pass
      SMTP_FROM: "Kemcon CI <ci@example.com>"
      SMTP_SECURE: "false"
      CONTACT_TO: ci@example.com
      CLOUDINARY_CLOUD_NAME: ci-cloud
      CLOUDINARY_API_KEY: "000000000000000"
      CLOUDINARY_API_SECRET: ci-secret
      NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET: ci-preset
      NEXT_PUBLIC_SENTRY_DSN: ""
      SENTRY_DSN: ""
      SENTRY_ORG: ""
      SENTRY_PROJECT: ""
      SENTRY_AUTH_TOKEN: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
